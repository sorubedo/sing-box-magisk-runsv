name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest sing-box binaries
        id: upstream
        run: bash fetch.sh

      - name: Read module version
        id: prep
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package per ABI
        run: bash package.sh

      - name: Write build summary
        env:
          MODULE_VERSION: ${{ steps.prep.outputs.version }}
          SING_BOX_VERSION: ${{ steps.upstream.outputs.sing_box_version }}
          SUBSING_VERSION: ${{ steps.upstream.outputs.subsing_version }}
        run: |
          {
            echo "## sing-box-runsv build"
            echo
            echo "- Module: $MODULE_VERSION"
            echo "- sing-box: $SING_BOX_VERSION"
            echo "- subsing: $SUBSING_VERSION"
            echo "- Packages: arm64-v8a, armeabi-v7a, x86_64, x86"
            echo
            echo '```text'
            cat out/SHA256SUMS
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload arm64-v8a artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-runsv-${{ steps.prep.outputs.version }}-arm64-v8a
          path: |
            out/sing-box-runsv-${{ steps.prep.outputs.version }}-arm64-v8a.zip
            out/SHA256SUMS
            out/upstream-versions.env
          if-no-files-found: error

      - name: Upload armeabi-v7a artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-runsv-${{ steps.prep.outputs.version }}-armeabi-v7a
          path: |
            out/sing-box-runsv-${{ steps.prep.outputs.version }}-armeabi-v7a.zip
            out/SHA256SUMS
            out/upstream-versions.env
          if-no-files-found: error

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-runsv-${{ steps.prep.outputs.version }}-x86_64
          path: |
            out/sing-box-runsv-${{ steps.prep.outputs.version }}-x86_64.zip
            out/SHA256SUMS
            out/upstream-versions.env
          if-no-files-found: error

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-runsv-${{ steps.prep.outputs.version }}-x86
          path: |
            out/sing-box-runsv-${{ steps.prep.outputs.version }}-x86.zip
            out/SHA256SUMS
            out/upstream-versions.env
          if-no-files-found: error
