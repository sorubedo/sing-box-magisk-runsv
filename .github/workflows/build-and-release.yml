name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest sing-box binaries
        run: bash fetch.sh

      - name: Prepare module
        id: prep
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p dist
          cp -r META-INF customize.sh uninstall.sh action.sh module.prop bin sv dist/

      - name: Package module
        run: |
          cd dist
          zip -r "../sing-box-runsv-${{ steps.prep.outputs.version }}.zip" .

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prep.outputs.version }}
          name: v${{ steps.prep.outputs.version }}
          files: sing-box-runsv-${{ steps.prep.outputs.version }}.zip
          draft: false
          prerelease: false
